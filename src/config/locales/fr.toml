description = "Projet professionnel de la mission Scalian. L'objectif était de développer une pipeline pour calculer les émissions de CO2 (normes européennes) à partir des données de trafic d'une ville. Nous avons utilisé les bibliothèques SUMO et COPERT pour calculer les émissions."
date = "févr. 2024 - avr. 2024"
image = "images/portfolio/coqair.png"

[[portfolio.list_project]]
