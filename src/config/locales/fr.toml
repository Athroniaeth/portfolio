description = "Projet scolaire visant à créer un modèle d'apprentissage par renforcement avec la bibliothèque Gym. L'objectif était de créer un modèle qui apprend à naviguer dans un monde en grille avec une falaise, en utilisant l'algorithme Sarsa."
